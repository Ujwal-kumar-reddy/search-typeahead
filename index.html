<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Search</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f8fafc; }
        .container { width: 600px; position: relative; }
        #searchBar { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; outline: none; }
        #dropdown { position: absolute; width: 100%; background: white; border: 1px solid #ddd; border-radius: 0 0 10px 10px; z-index: 10; display: none; }
        .item { padding: 10px; cursor: pointer; }
        .item:hover { background: #eee; }
        #trendingList { margin-top: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="searchBar" placeholder="Search..." autocomplete="off">
        <div id="dropdown"></div>
        <h3>Trending Searches</h3>
        <div id="trendingList"></div>
    </div>

    <script>
        const searchBar = document.getElementById('searchBar');
        const dropdown = document.getElementById('dropdown');

        searchBar.addEventListener('input', async () => {
            const q = searchBar.value;
            if (q.length < 3) { dropdown.style.display = 'none'; return; }
            const res = await fetch(`/suggest?q=${q}`);
            const data = await res.json();
            dropdown.innerHTML = data.map(t => `<div class="item" onclick="handleSearch('${t}')">${t}</div>`).join('');
            dropdown.style.display = 'block';
        });

        searchBar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch(searchBar.value);
        });

        async function handleSearch(val) {
            if (!val) return;
            searchBar.value = val;
            dropdown.style.display = 'none';
            await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: val })
            });
            loadTrending();
        }

        async function loadTrending() {
            const res = await fetch('/api/trending');
            const data = await res.json();
            document.getElementById('trendingList').innerHTML = data.map(item => `
                <div class="row">
                    <span>${item.value}</span>
                    <span>${item.score} searches</span>
                </div>
            `).join('');
        }
        loadTrending();
    </script>
</body>
</html>
